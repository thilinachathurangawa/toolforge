<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  <!-- Hammer/wrench icon -->
  <g transform="translate(50,50) scale(0.8)">
    <!-- Wrench handle -->
    <rect x="-8" y="-25" width="16" height="35" rx="3" fill="#ffffff" transform="rotate(-45)"/>
    <!-- Wrench head -->
    <path d="M-15,-35 L15,-35 L18,-25 L-18,-25 Z" fill="#ffffff" transform="rotate(-45)"/>
    <!-- Wrench opening -->
    <circle cx="0" cy="-30" r="8" fill="url(#grad1)" transform="rotate(-45)"/>
  </g>
</svg>
